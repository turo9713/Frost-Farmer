<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Frost Farmer 4.0</title><link rel="stylesheet" href="app.css">
</head>
<body>
  <main>
    <header><div><span class="eyebrow">AUTONOMOUS RUNTIME</span><h1>Frost Farmer <b>4.0</b></h1></div><span id="connection" class="status">offline</span></header>
    <section class="auth"><label>API key <input id="key" type="password" value="change-me"></label><button id="connect">Connect</button></section>
    <section id="metrics" class="metrics"></section>
    <section class="panel"><h2>Queue a goal</h2><form id="taskForm"><input id="goal" placeholder="echo hello, world" required><input id="priority" type="number" value="0" title="Priority"><button>Run task</button></form></section>
    <section class="panel"><div class="row"><h2>Task activity</h2><button id="refresh" class="quiet">Refresh</button></div><div id="tasks" class="tasks"><p>Connect to load tasks.</p></div></section>
  </main><script src="app.js"></script>
</body></html>
