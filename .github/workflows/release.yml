name: addon-release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate and package
        shell: pwsh
        run: ./scripts/package.ps1
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/FrostFarmer-*.zip
