name: ci
permissions:
  contents: read
  packages: write
on:
  push:
  pull_request:
jobs:
  build-test-package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Build and unit tests
        shell: pwsh
        run: ./scripts/build.ps1
      - name: Integration tests
        shell: pwsh
        run: ./scripts/integration-test.ps1
      - name: Package
        shell: pwsh
        run: ./scripts/package.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: FrostFarmer-4.0.0-win-x64
          path: artifacts/FrostFarmer-4.0.0-win-x64.zip
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/frost-farmer:latest
            ghcr.io/${{ github.repository_owner }}/frost-farmer:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
