name: addon-ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua compiler
        run: sudo apt-get update && sudo apt-get install -y lua5.4
      - name: Check Lua syntax
        run: find . -maxdepth 1 -name '*.lua' -print0 | xargs -0 -n1 luac -p
      - name: Validate manifest and safety rules
        shell: pwsh
        run: ./scripts/validate.ps1
      - name: Build release archive
        shell: pwsh
        run: ./scripts/package.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: FrostFarmer-addon
          path: artifacts/FrostFarmer-*.zip
