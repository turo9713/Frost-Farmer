services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: frostfarmer
      POSTGRES_USER: frostfarmer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frostfarmer -d frostfarmer"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]
    security_opt: [no-new-privileges:true]

  app:
    image: ${APP_IMAGE:-ghcr.io/turo9713/frost-farmer:latest}
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      FROST_FrostFarmer__DatabaseConnectionString: Host=postgres;Port=5432;Database=frostfarmer;Username=frostfarmer;Password=${POSTGRES_PASSWORD};SSL Mode=Disable
      FROST_FrostFarmer__AllowBootstrapRegistration: ${ALLOW_BOOTSTRAP_REGISTRATION:-true}
      FROST_FrostFarmer__TokenLifetimeHours: ${TOKEN_LIFETIME_HOURS:-24}
      FROST_FrostFarmer__RequestsPerMinute: ${REQUESTS_PER_MINUTE:-120}
      AllowedHosts: ${DOMAIN:?Set DOMAIN in .env};localhost;127.0.0.1;app
    volumes:
      - ./plugins:/app/plugins:ro
    read_only: true
    tmpfs: [/tmp]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    networks: [backend]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on: [app]
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [backend]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: [no-new-privileges:true]

networks:
  backend:
    driver: bridge
volumes:
  postgres_data:
  caddy_data:
  caddy_config:
